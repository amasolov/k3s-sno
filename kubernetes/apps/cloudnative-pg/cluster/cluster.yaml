---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: awx-db
  namespace: cnpg-system
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  storage:
    storageClass: local-path
    size: 8Gi

  # Each nuke/rebuild cycle needs a unique serverName so new WALs don't
  # collide with the old archive. Before nuking, run: task cluster:rotate
  serverName: awx-db-v2

  # Restore from the latest R2 backup on cluster creation.
  # For a truly fresh start (no backup in R2), run: task cluster:init-fresh
  bootstrap:
    recovery:
      source: awx-db-r2

  externalClusters:
    - name: awx-db-r2
      barmanObjectStore:
        serverName: awx-db
        destinationPath: s3://k3s-snow/cnpg/
        endpointURL: https://f83921207a0950106ace0d7751708a29.r2.cloudflarestorage.com
        s3Credentials:
          accessKeyId:
            name: cnpg-r2-credentials
            key: access-key-id
          secretAccessKey:
            name: cnpg-r2-credentials
            key: secret-access-key
        wal:
          compression: gzip
        data:
          compression: gzip

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  backup:
    barmanObjectStore:
      destinationPath: s3://k3s-snow/cnpg/
      endpointURL: https://f83921207a0950106ace0d7751708a29.r2.cloudflarestorage.com
      s3Credentials:
        accessKeyId:
          name: cnpg-r2-credentials
          key: access-key-id
        secretAccessKey:
          name: cnpg-r2-credentials
          key: secret-access-key
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: 7d
