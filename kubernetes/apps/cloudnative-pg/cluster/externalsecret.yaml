---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: awx-db-credentials
  namespace: cnpg-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: awx-db-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: awx
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: k3s-sno/awx/postgres-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-r2-credentials
  namespace: cnpg-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: cnpg-r2-credentials
    creationPolicy: Owner
  data:
    - secretKey: access-key-id
      remoteRef:
        key: k3s-sno/cnpg/r2-access-key-id
    - secretKey: secret-access-key
      remoteRef:
        key: k3s-sno/cnpg/r2-secret-access-key
