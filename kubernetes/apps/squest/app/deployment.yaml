---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squest-web
  namespace: squest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squest-web
  template:
    metadata:
      labels:
        app: squest-web
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/amasolov/squest:latest
          command: ["python", "manage.py", "migrate", "--database", "psql", "--noinput"]
          envFrom:
            - configMapRef:
                name: squest-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-db-password
                  key: password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: squest-secret-key
                  key: secret-key
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-rabbitmq-password
                  key: password
            - name: REDIS_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-redis-password
                  key: password
        - name: collectstatic
          image: ghcr.io/amasolov/squest:latest
          command: ["python", "manage.py", "collectstatic", "--noinput"]
          envFrom:
            - configMapRef:
                name: squest-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-db-password
                  key: password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: squest-secret-key
                  key: secret-key
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-rabbitmq-password
                  key: password
            - name: REDIS_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-redis-password
                  key: password
          volumeMounts:
            - name: static
              mountPath: /app/static
        - name: insert-default-data
          image: ghcr.io/amasolov/squest:latest
          command: ["python", "manage.py", "insert_default_data"]
          envFrom:
            - configMapRef:
                name: squest-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-db-password
                  key: password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: squest-secret-key
                  key: secret-key
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-rabbitmq-password
                  key: password
            - name: REDIS_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-redis-password
                  key: password
      containers:
        - name: django
          image: ghcr.io/amasolov/squest:latest
          envFrom:
            - configMapRef:
                name: squest-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-db-password
                  key: password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: squest-secret-key
                  key: secret-key
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-rabbitmq-password
                  key: password
            - name: REDIS_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-redis-password
                  key: password
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: static
              mountPath: /app/static
            - name: media
              mountPath: /app/media
        - name: nginx
          image: nginx:1-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: static
              mountPath: /app/static
              readOnly: true
            - name: media
              mountPath: /app/media
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      volumes:
        - name: static
          emptyDir: {}
        - name: media
          persistentVolumeClaim:
            claimName: squest-media
        - name: nginx-config
          configMap:
            name: squest-nginx-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squest-celery-worker
  namespace: squest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squest-celery-worker
  template:
    metadata:
      labels:
        app: squest-celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ghcr.io/amasolov/squest:latest
          command: ["celery", "-A", "service_catalog", "worker", "-l", "info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: squest-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-db-password
                  key: password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: squest-secret-key
                  key: secret-key
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-rabbitmq-password
                  key: password
            - name: REDIS_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-redis-password
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squest-celery-beat
  namespace: squest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squest-celery-beat
  template:
    metadata:
      labels:
        app: squest-celery-beat
    spec:
      containers:
        - name: celery-beat
          image: ghcr.io/amasolov/squest:latest
          command: ["celery", "-A", "service_catalog", "beat", "-l", "info"]
          envFrom:
            - configMapRef:
                name: squest-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-db-password
                  key: password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: squest-secret-key
                  key: secret-key
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-rabbitmq-password
                  key: password
            - name: REDIS_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squest-redis-password
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
