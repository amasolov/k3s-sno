---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squest-rabbitmq
  namespace: squest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squest-rabbitmq
  template:
    metadata:
      labels:
        app: squest-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:4-management-alpine
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: squest
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: squest-rabbitmq-password
                  key: password
            - name: RABBITMQ_DEFAULT_VHOST
              value: squest
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: squest-rabbitmq
  namespace: squest
spec:
  selector:
    app: squest-rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
      name: amqp
    - port: 15672
      targetPort: 15672
      name: management
