---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: squest
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/squest/app
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: squest
  dependsOn:
    - name: external-secrets-store
    - name: cloudnative-pg-cluster
