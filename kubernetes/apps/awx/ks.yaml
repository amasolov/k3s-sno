---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: awx
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/awx/app
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: awx
  dependsOn:
    - name: external-secrets
