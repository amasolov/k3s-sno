---
version: '3'

set: [pipefail]

vars:
  ANSIBLE_DIR: '{{.ROOT_DIR}}/ansible'
  KUBERNETES_DIR: '{{.ROOT_DIR}}/kubernetes'

env:
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  SOPS_AGE_KEY_FILE: '{{.ROOT_DIR}}/age.key'
  ANSIBLE_CONFIG: '{{.ANSIBLE_DIR}}/ansible.cfg'

includes:
  ansible: .taskfiles/ansible
  bootstrap: .taskfiles/bootstrap
  cluster: .taskfiles/cluster
  flux: .taskfiles/flux
  k8s: .taskfiles/k8s

tasks:

  default:
    silent: true
    cmd: task --list

  reconcile:
    desc: Force Flux to reconcile from Git
    cmd: flux reconcile source git flux-system --namespace flux-system
    preconditions:
      - test -f {{.ROOT_DIR}}/kubeconfig
      - which flux

  rebuild:
    desc: Full rebuild — install k3s, bootstrap Flux, wait for readiness (restores DB from R2)
    cmds:
      - task: ansible:k3s
      - task: bootstrap:secrets
      - task: bootstrap:flux
      - task: cluster:wait
      - echo "Cluster rebuilt (DB restored from R2). Run 'task ansible:awx-config' once AWX is ready."

  nuke-rebuild:
    desc: Nuke the cluster and rebuild from scratch (restores DB from R2)
    prompt: ⚠️  This will DESTROY and REBUILD the cluster. Continue?
    cmds:
      - task: cluster:rotate
      - task: cluster:nuke
      - task: rebuild
