---
name: Build Squest ARM64

on:
  workflow_dispatch:
    inputs:
      squest_version:
        description: "Squest version tag to build"
        required: true
        # renovate: datasource=github-releases depName=HewlettPackard/squest
        default: "v2.8.1"
  schedule:
    - cron: "0 4 * * 0" # weekly Sunday 4am UTC

env:
  SQUEST_REPO: HewlettPackard/squest
  IMAGE_NAME: ghcr.io/amasolov/squest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.squest_version }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(curl -s https://api.github.com/repos/${{ env.SQUEST_REPO }}/releases/latest | jq -r '.tag_name')
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Squest source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SQUEST_REPO }}
          ref: ${{ steps.version.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version number
        id: semver
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          echo "semver=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/squest.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.semver }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
