---
name: Build Squest ARM64

on:
  workflow_dispatch:
    inputs:
      squest_version:
        description: "Squest version tag to build"
        required: true
        # renovate: datasource=github-releases depName=HewlettPackard/squest
        default: "v2.8.1"
  schedule:
    - cron: "0 4 * * 0" # weekly Sunday 4am UTC

env:
  SQUEST_REPO: HewlettPackard/squest
  IMAGE_NAME: ghcr.io/amasolov/squest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.squest_version }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(curl -s https://api.github.com/repos/${{ env.SQUEST_REPO }}/releases/latest | jq -r '.tag_name')
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Squest source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SQUEST_REPO }}
          ref: ${{ steps.version.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch for PostgreSQL support
        run: |
          # 1. Make the default DB engine configurable via DB_ENGINE env var
          python3 << 'PYEOF'
          import re

          with open('Squest/settings.py') as f:
              content = f.read()

          content = content.replace(
              "'ENGINE': \"django.db.backends.mysql\",",
              "'ENGINE': os.environ.get('DB_ENGINE', 'django.db.backends.mysql'),"
          )
          content = content.replace(
              "'OPTIONS': {'charset': 'utf8mb4'}",
              "**({'OPTIONS': {'charset': 'utf8mb4'}} if 'mysql' in os.environ.get('DB_ENGINE', 'mysql') else {})"
          )

          with open('Squest/settings.py', 'w') as f:
              f.write(content)
          print('Patched settings.py')
          PYEOF

          # 2. Fix MySQL-specific double-quoted strings in RunSQL migrations
          python3 << 'PYEOF'
          import re, glob

          for filepath in glob.glob('**/migrations/*.py', recursive=True):
              with open(filepath) as f:
                  content = f.read()
              if 'RunSQL' not in content:
                  continue
              original = content
              def fix_runsql(match):
                  inner = match.group(1)
                  if '"' not in inner:
                      return match.group(0)
                  inner = inner.replace('"', "'")
                  return f'RunSQL("{inner}")'
              content = re.sub(r"RunSQL\('((?:[^'\\]|\\.)*)'\)", fix_runsql, content)
              if content != original:
                  with open(filepath, 'w') as f:
                      f.write(content)
                  print(f'Patched: {filepath}')
          PYEOF

      - name: Extract version number
        id: semver
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          echo "semver=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/squest.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.semver }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
